            }

            align-items: flex-start;

            animation: slideIn 0.4s ease;
            animation-fill-mode: backwards;

        .answer-option:nth-child(1) { animation-delay: 0.1s; }
        .answer-option:nth-child(2) { animation-delay: 0.15s; }
        .answer-option:nth-child(3) { animation-delay: 0.2s; }
        .answer-option:nth-child(4) { animation-delay: 0.25s; }

        .answer-option:active {

            line-height: 1.5;

            background: #fee2e2;
            animation: shake 0.5s ease;
        }

            background: #ef4444;
        }

        .answer-option.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }

        let currentIndex = 0;
        let score = 0;
        let selectedChapter = null;
        const chapterBtns = document.querySelectorAll('.chapter-btn');
        const startBtn = document.getElementById('startBtn');

        chapterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                chapterBtns.forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedChapter = this.getAttribute('data-chapter');
                startBtn.disabled = false;
                startBtn.textContent = 'Bắt đầu làm bài';
                
                console.log('Selected chapter:', selectedChapter);
            });
        });

        startBtn.addEventListener('click', startQuiz);

        function startQuiz() {

            if (selectedChapter === 'all') {
                currentQuestions = [...questionsData[1], ...questionsData[2], ...questionsData[3]];
            } else {
                currentQuestions = [...questionsData[parseInt(selectedChapter)]];
            }
            currentQuestions.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            score = 0;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('header').style.display = 'flex';
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('quizScreen').style.display = 'flex';

            showQuestion();
        }

        function showQuestion() {
            const question = currentQuestions[currentIndex];
            
            document.getElementById('questionCount').textContent = `${currentIndex + 1}/${currentQuestions.length}`;
            document.getElementById('scoreBadge').textContent = `${score}đ`;
            document.getElementById('questionText').textContent = question.q;
            
            const answersGrid = document.getElementById('answersGrid');
            answersGrid.innerHTML = '';
            
            const labels = ['A', 'B', 'C', 'D'];
            question.a.forEach((answer, index) => {
                const div = document.createElement('div');
                div.className = 'answer-option';
                div.innerHTML = `
                    <div class="answer-label">${labels[index]}</div>
                    <div class="answer-text">${answer}</div>
                `;
                div.addEventListener('click', () => selectAnswer(index));
                answersGrid.appendChild(div);
            });

            document.getElementById('bottomBar').style.display = 'none';
            updateProgress();
        }

        function selectAnswer(selectedIndex) {
            const question = currentQuestions[currentIndex];
            const options = document.querySelectorAll('.answer-option');
            
            options.forEach(opt => opt.classList.add('disabled'));
            
            if (selectedIndex === question.c) {
                options[selectedIndex].classList.add('correct');
                score += 10;
                document.getElementById('scoreBadge').textContent = `${score}đ`;
            } else {
                options[selectedIndex].classList.add('wrong');
                options[question.c].classList.add('correct');
            }
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < currentQuestions.length) {
                    document.getElementById('questionContainer').scrollTop = 0;
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                document.getElementById('questionContainer').scrollTop = 0;
                showQuestion();
            } else {
                showResults();
            }
        });

        function updateProgress() {
            const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            const total = currentQuestions.length;
            const correct = score / 10;
            const wrong = total - correct;
            const percentage = Math.round((correct / total) * 100);

            document.getElementById('header').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('bottomBar').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';

            document.getElementById('resultScore').textContent = percentage + '%';
            document.getElementById('totalQ').textContent = total;
            document.getElementById('correctQ').textContent = correct;
            document.getElementById('wrongQ').textContent = wrong;

            let icon = '🏆', message = '';
            if (percentage >= 90) {
                icon = '🏆';
                message = 'Xuất sắc!';
            } else if (percentage >= 70) {
                icon = '🎉';
                message = 'Tốt lắm!';
            } else if (percentage >= 50) {
                icon = '👍';
                message = 'Khá tốt!';
            } else {
                icon = '💪';
                message = 'Cố gắng lên!';
            }

            document.getElementById('resultIcon').textContent = icon;
            document.getElementById('resultMessage').textContent = message;
        }

        window.resetQuiz = function() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('progressFill').style.width = '0%';
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = 'Chọn chương để bắt đầu';
            selectedChapter = null;
        }
    </script>
</body>
</html>
